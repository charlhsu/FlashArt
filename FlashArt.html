<!DOCTYPE html>

<html>
    <head>
        <title>FlashArt</title>
        <meta charset="ISO-8859-1">

        <!-- Leaflet stylesheet import -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>

        <!-- Personal stylesheet import -->
        <link rel="stylesheet" href = "style.css"/>

        <!-- Leaflet script import -->
         <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    </head>
    <body>
        <header>
            <h1>FlashArt</h1>
            
        </header>

        <main>
            <!-- carte -->
            <div id="map" style="flex:1">
            </div>
            
            <!-- Ecran d'upload d'image -->
            <div id="uploadScreen">
                <button id="cancelButton">ANNULER</button>
                <input type="file" id="uploadTag" accept="image/*">
                <img id="output" src="" alt="">
                <button id="saveButton">Enregistrer</button>
                
            </div>
        </main>

        <!-- scripts -->
        <script type="module" src="leaflet.js"></script>
        
        

        

        <!-- Prévisualisation -->
        <div id="imageContainer">
            <img id="output" src="" alt="Pas d'image">
        </div>

        <!-- Bouton photo et menu -->
        <nav>
            <button id = "Liste">Liste</button>
            <button id="photo_button">Flash</button>
            <button id = "Gallerie">Gallerie</button>
        </nav>

    </body>
</html>
